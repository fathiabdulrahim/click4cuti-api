# Name of your application. Used to uniquely configure containers.
service: click4cuti_api

# Name of the container image.
image: fathi21/click4cuti

# Deploy to these servers.
servers:
  web:
    - 139.162.38.63

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
proxy:
  ssl: true
  host: api-click4cuti.far.my

# Credentials for your image host.
registry:
  username: fathi21

  # Always use an access token rather than real password when possible.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    # Database host — matches the db accessory container name on the kamal docker network.
    DB_HOST: click4cuti_api-db

    # Redis host — matches the redis accessory container name on the kamal docker network.
    REDIS_URL: redis://click4cuti_api-redis:6379/0

    # Log everything from Rails
    RAILS_LOG_LEVEL: debug

    # CORS — frontend origin(s)
    CORS_ORIGIN_STAGING: https://click4cuti.far.my

    # Devise mailer sender
    DEVISE_MAILER_FROM: noreply@click4cuti.com

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Use a persistent storage volume for Active Storage files.
volumes:
  - "click4cuti_api_storage:/rails/storage"

# Configure the image builder.
builder:
  arch: amd64
  remote: ssh://deployer@139.162.38.63

# Use a different ssh user than root
ssh:
  user: deployer

# Use accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:17
    host: 139.162.38.63
    port: "5433:5432"
    env:
      clear:
        POSTGRES_USER: "postgres"
        POSTGRES_DB: "click4cuti_api_production"
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: redis:7
    host: 139.162.38.63
    port: "6380:6379"
    directories:
      - data:/data
